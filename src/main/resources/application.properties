spring.application.name=LocalConnect

# ── Server ─────────────────────────────────────────────────────────
server.port=8080

# ── Thymeleaf ──────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Database (H2 in-memory for local development) ─────────────────
spring.datasource.url=jdbc:h2:mem:localconnect;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── Database (PostgreSQL – uncomment for production) ───────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/localconnect
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=postgres

# ── JPA ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Disable PostgreSQL dialect override when using H2
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Redis ──────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=500
spring.data.redis.connect-timeout=500
# Lazy connection: app starts even if Redis is not running locally
spring.data.redis.lettuce.shutdown-timeout=100ms
spring.data.redis.lettuce.pool.enabled=true
# Initialize Redis connection lazily so DevTools restart doesn't block/timeout
spring.data.redis.repositories.enabled=false

# ── JWT ────────────────────────────────────────────────────────────
app.jwt.secret=bG9jYWxjb25uZWN0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjY=
app.jwt.expiration-ms=86400000

# ── OTP ────────────────────────────────────────────────────────────
app.otp.expiry-minutes=5
app.otp.max-attempts=5

# ── Mail / SMTP ────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
