spring.mail.password=gfff xqut fjtr xoej
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=LocalConnect <charannaga460@gmail.com>

# ── SOS ────────────────────────────────────────────────────────────
app.sos.default-radius-km=1.0

# ── Location ───────────────────────────────────────────────────────
app.location.nearby-radius-km=2.0

# ── CORS ───────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# ── Actuator ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── DevTools ───────────────────────────────────────────────────────
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
